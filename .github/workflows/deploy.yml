name: Deploy

on:
  workflow_call:
    inputs:
      gcloud_image:
        description: A GCloud registry image to deploy
        required: true
        type: string
      environment:
        description: An environment to deploy to
        required: true
        type: string
      gcloud_project_id:
        required: true
        type: string
      gcloud_region:
        required: true
        type: string
      gcloud_run_service:
        required: true
        type: string
      env_var_environment:
        description: Value for ENVIRONMENT env var in Cloud Run
        required: true
        type: string
      gcloud_secret_version_telegram_token:
        description: Version of Telegram Token secret
        required: true
        type: string
    secrets:
      GCLOUD_IDENTITY_PROVIDER:
        required: true
      GCLOUD_SERVICE_ACCOUNT:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Google Cloud authentication
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ inputs.gcloud_project_id }}
          workload_identity_provider: ${{ secrets.GCLOUD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCLOUD_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Cloud Run deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ inputs.gcloud_run_service }}
          image: ${{ inputs.gcloud_image }}
          env_vars: ENVIRONMENT=${{ inputs.env_var_environment }}
          secrets: TELEGRAM_APITOKEN=${{ inputs.gcloud_secret_version_telegram_token }}
          region: ${{ inputs.gcloud_region }}
          project_id: ${{ inputs.gcloud_project_id }}