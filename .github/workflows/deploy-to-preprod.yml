name: Deploy to preprod

on:
  workflow_dispatch:
    inputs:
      description:
        description: "What's being deployed"
        required: false
        type: string
      dry_run:
        description: "Dry run: skip registry push and deployment (default: true for safety)"
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-preprod
  cancel-in-progress: false

jobs:
  deploy-to-preprod-dry-run:
    name: Deploy to preprod (dry-run)
    if: inputs.dry_run == true
    runs-on: ubuntu-latest
    environment: preprod
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/dry-run
        with:
          dry_run: 'true'

      - uses: ./.github/actions/auth

      - id: build-and-push
        uses: ./.github/actions/build-and-push
        with:
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          dry_run: 'true'

      - uses: ./.github/actions/deploy
        with:
          env_var_environment: ${{ vars.ENVIRONMENT }}
          gcloud_image: ${{ steps.build-and-push.outputs.gcloud_tag }}
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          gcloud_run_service: ${{ vars.GCLOUD_RUN_SERVICE }}
          gcloud_secret_version_telegram_token: ${{ vars.GCLOUD_SECRET_TELEGRAM_APITOKEN_VERSION }}
          dry_run: 'true'

  deploy-to-preprod:
    name: Deploy to preprod
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    environment: preprod
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/auth

      - id: build-and-push
        uses: ./.github/actions/build-and-push
        with:
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          dry_run: 'false'

      - uses: ./.github/actions/deploy
        with:
          env_var_environment: ${{ vars.ENVIRONMENT }}
          gcloud_image: ${{ steps.build-and-push.outputs.gcloud_tag }}
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          gcloud_run_service: ${{ vars.GCLOUD_RUN_SERVICE }}
          gcloud_secret_version_telegram_token: ${{ vars.GCLOUD_SECRET_TELEGRAM_APITOKEN_VERSION }}
          dry_run: 'false'
