name: CI Image

on:
  workflow_dispatch:

env:
  TDLIB_COMMIT: 971684a

jobs:
  publish:
    name: Build and push CI image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/ci.dockerfile
          build-args: TDLIB_COMMIT=${{ env.TDLIB_COMMIT }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ci:tdlib-${{ env.TDLIB_COMMIT }}
            ghcr.io/${{ github.repository }}/ci:latest