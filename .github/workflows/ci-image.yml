name: CI Image

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build without pushing to GHCR (default: true for safety)"
        required: false
        type: boolean
        default: true

env:
  TDLIB_COMMIT: ${{ vars.TDLIB_COMMIT }}

jobs:
  publish-dry-run:
    name: Build CI image (dry-run)
    if: inputs.dry_run == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/dry-run
        with:
          dry_run: 'true'

      - uses: ./.github/actions/auth

      - name: Build without push (dry-run)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/ci.dockerfile
          build-args: TDLIB_COMMIT=${{ env.TDLIB_COMMIT }}
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}/ci:tdlib-${{ env.TDLIB_COMMIT }}

      - name: Dry-run summary
        run: |
          {
            echo "## Dry-run mode — push skipped"
            echo ""
            echo "| key | value |"
            echo "|---|---|"
            echo "| TDLIB_COMMIT | \`${{ env.TDLIB_COMMIT }}\` |"
            echo "| ghcr_tag (tdlib) | \`ghcr.io/${{ github.repository }}/ci:tdlib-${{ env.TDLIB_COMMIT }}\` |"
            echo "| ghcr_tag (latest) | \`ghcr.io/${{ github.repository }}/ci:latest\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Build and push CI image
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/auth

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/ci.dockerfile
          build-args: TDLIB_COMMIT=${{ env.TDLIB_COMMIT }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ci:tdlib-${{ env.TDLIB_COMMIT }}
            ghcr.io/${{ github.repository }}/ci:latest
