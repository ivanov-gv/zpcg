name: CI Image

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: skip build and push to GHCR (default: true for safety)"
        required: false
        type: boolean
        default: true

env:
  TDLIB_COMMIT: 971684a

jobs:
  publish:
    name: Build and push CI image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: env.ACT != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: env.ACT != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/ci.dockerfile
          build-args: TDLIB_COMMIT=${{ env.TDLIB_COMMIT }}
          push: ${{ inputs.dry_run != 'true' }}
          tags: |
            ghcr.io/${{ github.repository }}/ci:tdlib-${{ env.TDLIB_COMMIT }}
            ghcr.io/${{ github.repository }}/ci:latest

      - name: Dry-run summary
        if: inputs.dry_run == 'true' || env.ACT == 'true'
        run: |
          {
            echo "## Dry-run mode — build and push skipped"
            echo ""
            echo "| key | value |"
            echo "|---|---|"
            echo "| TDLIB_COMMIT | \`${{ env.TDLIB_COMMIT }}\` |"
            echo "| ghcr_tag (tdlib) | \`ghcr.io/${{ github.repository }}/ci:tdlib-${{ env.TDLIB_COMMIT }}\` |"
            echo "| ghcr_tag (latest) | \`ghcr.io/${{ github.repository }}/ci:latest\` |"
            echo "| act | \`${{ env.ACT }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
