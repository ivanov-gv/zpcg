name: CI Image

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build without pushing to GHCR (default: true for safety)"
        required: false
        type: boolean
        default: true

env:
  TDLIB_COMMIT: ${{ vars.TDLIB_COMMIT }}

jobs:
  decide:
    name: Decide mode
    runs-on: ubuntu-latest
    outputs:
      dry_run: ${{ steps.compute.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - id: compute
        shell: bash
        env:
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [[ "$INPUT_DRY_RUN" == "true" ]]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/dry-run
        with:
          dry_run: ${{ steps.compute.outputs.dry_run }}

  publish-dry-run:
    name: Build CI image (dry-run)
    needs: decide
    if: needs.decide.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    env: &gcloud-env
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    steps: &publish-steps
      - uses: actions/checkout@v4

      - uses: ./.github/actions/auth

      - name: Build CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/ci.dockerfile
          build-args: TDLIB_COMMIT=${{ env.TDLIB_COMMIT }}
          push: ${{ needs.decide.outputs.dry_run != 'true' }}
          load: ${{ needs.decide.outputs.dry_run == 'true' }}
          tags: |
            ghcr.io/${{ github.repository }}/ci:tdlib-${{ env.TDLIB_COMMIT }}
            ghcr.io/${{ github.repository }}/ci:latest

  publish:
    name: Build and push CI image
    needs: decide
    if: needs.decide.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env: *gcloud-env
    steps: *publish-steps
