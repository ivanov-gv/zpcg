name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: skip registry push and deployments (default: true for safety)"
        required: false
        type: boolean
        default: true

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    outputs:
      gcloud_tag: ${{ steps.push.outputs.gcloud_tag }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect local act run
        id: detect
        run: |
          dry_run="${{ inputs.dry_run }}"
          if [[ "${ACT:-}" == "true" ]]; then
            dry_run="true"
            echo "::notice::Running in act (local) — dry-run mode enforced"
          elif [[ -z "$dry_run" ]]; then
            # Not triggered via workflow_dispatch (e.g. tag push) — default to not dry-run
            dry_run="false"
          fi
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"

      - id: push
        uses: ./.github/actions/build-and-push
        with:
          gcloud_identity_provider: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          gcloud_service_account: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
          github_token: ${{ github.token }}
          dry-run: ${{ steps.detect.outputs.dry_run }}

  deploy-to-preprod:
    name: Deploy to preprod
    runs-on: ubuntu-latest
    environment: preprod
    needs: build-and-push
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect local act run
        id: detect
        run: |
          dry_run="${{ inputs.dry_run }}"
          if [[ "${ACT:-}" == "true" ]]; then
            dry_run="true"
            echo "::notice::Running in act (local) — dry-run mode enforced"
          elif [[ -z "$dry_run" ]]; then
            dry_run="false"
          fi
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/deploy
        with:
          env_var_environment: ${{ vars.ENVIRONMENT }}
          gcloud_identity_provider: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
          gcloud_image: ${{ needs.build-and-push.outputs.gcloud_tag }}
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          gcloud_run_service: ${{ vars.GCLOUD_RUN_SERVICE }}
          gcloud_secret_version_telegram_token: ${{ vars.GCLOUD_SECRET_TELEGRAM_APITOKEN_VERSION }}
          gcloud_service_account: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
          dry-run: ${{ steps.detect.outputs.dry_run }}

  deploy-to-prod:
    name: Deploy to prod
    runs-on: ubuntu-latest
    environment: prod
    needs: [deploy-to-preprod, build-and-push]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect local act run
        id: detect
        run: |
          dry_run="${{ inputs.dry_run }}"
          if [[ "${ACT:-}" == "true" ]]; then
            dry_run="true"
            echo "::notice::Running in act (local) — dry-run mode enforced"
          elif [[ -z "$dry_run" ]]; then
            dry_run="false"
          fi
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/deploy
        with:
          env_var_environment: ${{ vars.ENVIRONMENT }}
          gcloud_identity_provider: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
          gcloud_image: ${{ needs.build-and-push.outputs.gcloud_tag }}
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          gcloud_run_service: ${{ vars.GCLOUD_RUN_SERVICE }}
          gcloud_secret_version_telegram_token: ${{ vars.GCLOUD_SECRET_TELEGRAM_APITOKEN_VERSION }}
          gcloud_service_account: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
          dry-run: ${{ steps.detect.outputs.dry_run }}
