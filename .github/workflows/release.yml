name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: skip registry push and deployments (default: true for safety)"
        required: false
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  decide:
    name: Decide mode
    runs-on: ubuntu-latest
    outputs:
      dry_run: ${{ steps.compute.outputs.dry_run }}
    steps:
      - id: compute
        shell: bash
        env:
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [[ "$INPUT_DRY_RUN" == "true" ]]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push-dry-run:
    name: Build and push (dry-run)
    needs: decide
    if: >-
      !cancelled() &&
      needs.decide.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    outputs:
      gcloud_tag: ${{ steps.build-and-push.outputs.gcloud_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/dry-run
        with:
          dry_run: ${{ needs.decide.outputs.dry_run }}

      - uses: ./.github/actions/auth

      - id: build-and-push
        uses: ./.github/actions/build-and-push
        with:
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          dry_run: ${{ needs.decide.outputs.dry_run }}

  build-and-push:
    name: Build and push
    needs: decide
    if: >-
      !cancelled() &&
      needs.decide.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    outputs:
      gcloud_tag: ${{ steps.build-and-push.outputs.gcloud_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/dry-run
        with:
          dry_run: ${{ needs.decide.outputs.dry_run }}

      - uses: ./.github/actions/auth

      - id: build-and-push
        uses: ./.github/actions/build-and-push
        with:
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          dry_run: ${{ needs.decide.outputs.dry_run }}

  deploy-to-preprod-dry-run:
    name: Deploy to preprod (dry-run)
    needs: [decide, build-and-push, build-and-push-dry-run]
    if: >-
      !cancelled() &&
      needs.decide.outputs.dry_run == 'true' &&
      needs.build-and-push-dry-run.result == 'success'
    runs-on: ubuntu-latest
    environment: preprod
    permissions:
      contents: read
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/dry-run
        with:
          dry_run: ${{ needs.decide.outputs.dry_run }}

      - uses: ./.github/actions/auth

      - uses: ./.github/actions/deploy
        with:
          env_var_environment: ${{ vars.ENVIRONMENT }}
          gcloud_image: ${{ needs.build-and-push.outputs.gcloud_tag || needs.build-and-push-dry-run.outputs.gcloud_tag }}
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          gcloud_run_service: ${{ vars.GCLOUD_RUN_SERVICE }}
          gcloud_secret_version_telegram_token: ${{ vars.GCLOUD_SECRET_TELEGRAM_APITOKEN_VERSION }}
          dry_run: ${{ needs.decide.outputs.dry_run }}

  deploy-to-preprod:
    name: Deploy to preprod
    needs: [decide, build-and-push, build-and-push-dry-run]
    if: >-
      !cancelled() &&
      needs.decide.outputs.dry_run != 'true' &&
      needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    environment: preprod
    permissions:
      contents: read
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/dry-run
        with:
          dry_run: ${{ needs.decide.outputs.dry_run }}

      - uses: ./.github/actions/auth

      - uses: ./.github/actions/deploy
        with:
          env_var_environment: ${{ vars.ENVIRONMENT }}
          gcloud_image: ${{ needs.build-and-push.outputs.gcloud_tag || needs.build-and-push-dry-run.outputs.gcloud_tag }}
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          gcloud_run_service: ${{ vars.GCLOUD_RUN_SERVICE }}
          gcloud_secret_version_telegram_token: ${{ vars.GCLOUD_SECRET_TELEGRAM_APITOKEN_VERSION }}
          dry_run: ${{ needs.decide.outputs.dry_run }}

  deploy-to-prod-dry-run:
    name: Deploy to prod (dry-run)
    needs: [decide, build-and-push, build-and-push-dry-run, deploy-to-preprod, deploy-to-preprod-dry-run]
    if: >-
      !cancelled() &&
      needs.decide.outputs.dry_run == 'true' &&
      needs.build-and-push-dry-run.result == 'success' &&
      needs.deploy-to-preprod-dry-run.result == 'success'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/dry-run
        with:
          dry_run: ${{ needs.decide.outputs.dry_run }}

      - uses: ./.github/actions/auth

      - uses: ./.github/actions/deploy
        with:
          env_var_environment: ${{ vars.ENVIRONMENT }}
          gcloud_image: ${{ needs.build-and-push.outputs.gcloud_tag || needs.build-and-push-dry-run.outputs.gcloud_tag }}
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          gcloud_run_service: ${{ vars.GCLOUD_RUN_SERVICE }}
          gcloud_secret_version_telegram_token: ${{ vars.GCLOUD_SECRET_TELEGRAM_APITOKEN_VERSION }}
          dry_run: ${{ needs.decide.outputs.dry_run }}

  deploy-to-prod:
    name: Deploy to prod
    needs: [decide, build-and-push, build-and-push-dry-run, deploy-to-preprod, deploy-to-preprod-dry-run]
    if: >-
      !cancelled() &&
      needs.decide.outputs.dry_run != 'true' &&
      needs.build-and-push.result == 'success' &&
      needs.deploy-to-preprod.result == 'success'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      GCLOUD_PROJECT_ID: ${{ vars.GCLOUD_PROJECT_ID }}
      GCLOUD_IDENTITY_PROVIDER: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
      GCLOUD_SERVICE_ACCOUNT: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      GCLOUD_REGION: ${{ vars.GCLOUD_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/dry-run
        with:
          dry_run: ${{ needs.decide.outputs.dry_run }}

      - uses: ./.github/actions/auth

      - uses: ./.github/actions/deploy
        with:
          env_var_environment: ${{ vars.ENVIRONMENT }}
          gcloud_image: ${{ needs.build-and-push.outputs.gcloud_tag || needs.build-and-push-dry-run.outputs.gcloud_tag }}
          gcloud_project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          gcloud_region: ${{ vars.GCLOUD_REGION }}
          gcloud_run_service: ${{ vars.GCLOUD_RUN_SERVICE }}
          gcloud_secret_version_telegram_token: ${{ vars.GCLOUD_SECRET_TELEGRAM_APITOKEN_VERSION }}
          dry_run: ${{ needs.decide.outputs.dry_run }}
