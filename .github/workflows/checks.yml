name: Checks

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no-op for checks — all jobs are read-only; kept for convention)"
        required: false
        type: boolean
        default: true

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

# Keep in sync with .github/workflows/ci-image.yml
env:
  TDLIB_COMMIT: 971684a

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build
        uses: ./.github/actions/build

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository }}/ci:tdlib-${{ env.TDLIB_COMMIT }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Run all tests
        run: go test -count=1 -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository }}/ci:tdlib-${{ env.TDLIB_COMMIT }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m ./...