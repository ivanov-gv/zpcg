on:
  workflow_call:
    inputs:
      commit_sha:
        description: "A commit to build a docker image from"
        required: true
        type: string
      push:
        description: "Whether to push the resulting image or not"
        required: false
        type: boolean
        default: false
      gcloud_region:
        description: "GCloud region (e.g. europe-west1)"
        required: true
        type: string
      gcloud_project_id:
        description: "GCloud project ID"
        required: true
        type: string
    secrets:
      GCLOUD_IDENTITY_PROVIDER:
        required: false
      GCLOUD_SERVICE_ACCOUNT:
        required: false

env:
  IMAGE_PATH_GHCR: ghcr.io/${{ github.repository }}
  IMAGE_PATH_GCLOUD: ${{ inputs.gcloud_region }}-docker.pkg.dev/${{ inputs.gcloud_project_id }}/${{ github.repository }}

jobs:
  # 1. Check if ghcr.io already has the image to be built
  # 2. If exists - return
  # 3. If not - build and push to BOTH ghcr.io AND pkg.dev
  build:
    runs-on: ubuntu-latest
    env:
      JOB_CONTINUE: true
    outputs:
      gcloud_tag: ${{ steps.check.outputs.image_gcloud_commit_short_sha }}
      all_tags: ${{ steps.meta.outputs.tags }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if already exists
        id: check
        shell: bash
        run: |
          set -euo pipefail

          COMMIT_SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "COMMIT_SHORT_SHA=${COMMIT_SHORT_SHA}"

          IMAGE_GCLOUD_COMMIT_SHORT_SHA="${IMAGE_PATH_GCLOUD}:${COMMIT_SHORT_SHA}"
          echo "image_gcloud_commit_short_sha=${IMAGE_GCLOUD_COMMIT_SHORT_SHA}" >> "$GITHUB_OUTPUT"

          IMAGE_GHCR_COMMIT_SHORT_SHA="${IMAGE_PATH_GHCR}:${COMMIT_SHORT_SHA}"

          if docker manifest inspect "$IMAGE_GHCR_COMMIT_SHORT_SHA" >/dev/null 2>&1; then
            echo "Image ${IMAGE_GHCR_COMMIT_SHORT_SHA} already exists. Skipping build."
            echo "JOB_CONTINUE=false" >> "$GITHUB_ENV"
          fi

      - name: Google Cloud authentication
        uses: google-github-actions/auth@v3
        if: env.JOB_CONTINUE == 'true' && inputs.push
        with:
          project_id: ${{ inputs.gcloud_project_id }}
          workload_identity_provider: ${{ secrets.GCLOUD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCLOUD_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Docker authentication
        if: env.JOB_CONTINUE == 'true' && inputs.push
        run: |
          gcloud auth configure-docker "${{ inputs.gcloud_region }}-docker.pkg.dev"

      - name: Docker meta (includes git tags)
        id: meta
        uses: docker/metadata-action@v5
        if: env.JOB_CONTINUE == 'true'
        with:
          images: |
            ${{ env.IMAGE_PATH_GHCR }}
            ${{ env.IMAGE_PATH_GCLOUD }}
          tags: |
            type=sha,prefix=,format=short          
            type=ref,event=tag

      - name: Build & push
        uses: docker/build-push-action@v6
        if: env.JOB_CONTINUE == 'true'
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          tags: ${{ steps.meta.outputs.tags }}
          push: ${{ inputs.push }}
          file: deploy/Dockerfile

      - name: Job Summary
        if: always()
        run: |
          {
            echo "# Build Summary"
            echo ""
            echo "## Outputs"
            echo "- **GCloud Tag**: ${{ steps.check.outputs.image_gcloud_commit_short_sha }}"
            echo "- **All Tags**: ${{ steps.meta.outputs.tags }}"
            echo "- **Build SHA**: ${{ inputs.commit_sha }}"
            echo "- **Build performed (not skipped)**: ${JOB_CONTINUE}"
          } >> "$GITHUB_STEP_SUMMARY"