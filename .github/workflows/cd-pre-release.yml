name: Pre-release deployment to preprod

on:
  release:
    types: [ prereleased ]
  workflow_dispatch:
    inputs:
      test_run:
        description: "Test run: skip registry push and deployment (default: true for safety)"
        required: false
        type: boolean
        default: true
      fallback_tag:
        description: "Tag to use when not triggered by a release (workflow_dispatch). Default is safe for test-run."
        required: false
        type: string
        default: test-run-tag

concurrency:
  group: deploy-preprod
  cancel-in-progress: false

jobs:
  switch:
    name: Test-run switch
    runs-on: ubuntu-latest
    outputs:
      test_run: ${{ steps.test_run.outputs.test_run }}
    steps:
      - uses: actions/checkout@v6
      - id: test_run
        uses: ./.github/actions/test_run
        with:
          test_run: ${{ inputs.test_run }}

  retag:
    name: Retag image and push to preprod registry
    needs: switch
    if: ${{ needs.switch.outputs.test_run != 'true' }}
    runs-on: ubuntu-latest
    environment: preprod
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag: ${{ steps.retag-env.outputs.PREPROD_IMAGE_TAG_TAG }}
    env: &retag-env
      AUTH_PROJECT_ID: ${{ secrets.ENV_PROJECT_ID }}
      AUTH_REGION: ${{ secrets.ENV_REGION }}
      AUTH_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.ENV_WORKLOAD_IDENTITY_PROVIDER }}
      AUTH_SERVICE_ACCOUNT: ${{ secrets.ENV_SERVICE_ACCOUNT }}
      GHCR_IMAGE_TAG_SHA: ghcr.io/${{ github.repository }}:${{ github.sha }}
      GHCR_IMAGE_TAG_TAG: ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name || inputs.fallback_tag }}
      PREPROD_IMAGE_TAG_SHA: ${{ secrets.ENV_IMAGE_PREFIX }}/${{ github.repository }}:${{ github.sha }}
      PREPROD_IMAGE_TAG_TAG: ${{ secrets.ENV_IMAGE_PREFIX }}/${{ github.repository }}:${{ github.event.release.tag_name || inputs.fallback_tag }}
    steps: &retag-steps
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: ./.github/actions/prod_auth
        with:
          project_id: ${{ env.AUTH_PROJECT_ID }}
          region: ${{ env.AUTH_REGION }}
          workload_identity_provider: ${{ env.AUTH_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.AUTH_SERVICE_ACCOUNT }}

      - id: retag-env
        name: Retag image
        shell: bash
        run: |
          docker buildx imagetools create -t ${{ env.PREPROD_IMAGE_TAG_SHA }} ${{ env.GHCR_IMAGE_TAG_SHA }}
          docker buildx imagetools create -t ${{ env.PREPROD_IMAGE_TAG_TAG }} ${{ env.GHCR_IMAGE_TAG_TAG }}
          echo "PREPROD_IMAGE_TAG_TAG=${{ env.PREPROD_IMAGE_TAG_TAG }}" >> $GITHUB_OUTPUT

  retag-test-run:
    name: (test-run) Retag image and push to preprod registry
    needs: switch
    if: ${{ needs.switch.outputs.test_run == 'true' }}
    runs-on: ubuntu-latest
    environment: test-run # <-- safety first
    permissions:
      contents: read
      packages: read # <-- safety first
      id-token: write
    outputs:
      image_tag: ${{ steps.retag-env.outputs.PREPROD_IMAGE_TAG_TAG }}
    env: *retag-env
    steps: *retag-steps

  retag-out:
    name: Retag output (fan-in)
    needs: [ retag, retag-test-run ]
    if: ${{ !cancelled() && (needs.retag.result == 'success' || needs.retag-test-run.result == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ needs.retag.outputs.image_tag || needs.retag-test-run.outputs.image_tag }}
    steps:
      - run: 'true'

  deploy:
    name: Deploy to preprod
    needs: [ switch, retag-out ]
    if: ${{ needs.switch.outputs.test_run != 'true' }}
    runs-on: ubuntu-latest
    environment: preprod
    env: &deploy-env
      TEST_RUN: ${{ needs.switch.outputs.test_run }}
      PREPROD_IMAGE: ${{ needs.retag-out.outputs.image_tag }}
      PREPROD_PROJECT_ID: ${{ secrets.ENV_PROJECT_ID }}
      PREPROD_REGION: ${{ secrets.ENV_REGION }}
      PREPROD_RUN_SERVICE: ${{ secrets.ENV_RUN_SERVICE }}
      PREPROD_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.ENV_WORKLOAD_IDENTITY_PROVIDER }}
      PREPROD_SERVICE_ACCOUNT: ${{ secrets.ENV_SERVICE_ACCOUNT }}
    steps: &deploy-steps
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prod_auth
        with:
          project_id: ${{ env.PREPROD_PROJECT_ID }}
          region: ${{ env.PREPROD_REGION }}
          workload_identity_provider: ${{ env.PREPROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.PREPROD_SERVICE_ACCOUNT }}
      - name: Deploy to preprod
        uses: ./.github/actions/deploy
        with:
          test_run: ${{ env.TEST_RUN }}
          gcloud_image: ${{ env.PREPROD_IMAGE }}
          gcloud_project_id: ${{ env.PREPROD_PROJECT_ID }}
          gcloud_region: ${{ env.PREPROD_REGION }}
          gcloud_run_service: ${{ env.PREPROD_RUN_SERVICE }}

  deploy-test-run:
    name: (test-run) Deploy to preprod
    needs: [ switch, retag-out ]
    if: ${{ needs.switch.outputs.test_run == 'true' }}
    runs-on: ubuntu-latest
    environment: test-run # <-- safety first
    env: *deploy-env
    steps: *deploy-steps
