name: Pull request checks

on:
  pull_request: 
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: ${{ github.ref != 'refs/heads/main' && 'ci-pr-checks-approval' || '' }}
    steps:
      - uses: actions/checkout@v6
      - name: Build
        uses: ./.github/actions/build

  test:
    name: Tests
    runs-on: ubuntu-latest
    environment: ${{ github.ref != 'refs/heads/main' && 'ci-pr-checks-approval' || '' }}
    container:
      image: ghcr.io/${{ github.repository }}/tdlib:${{ vars.TDLIB_COMMIT || '971684a' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - name: Run all tests
        run: go test -count=1 -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment: ${{ github.ref != 'refs/heads/main' && 'ci-pr-checks-approval' || '' }}
    container:
      image: ghcr.io/${{ github.repository }}/tdlib:${{ vars.TDLIB_COMMIT || '971684a' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m ./...

  workflows-lint:
    name: Lint workflows
    runs-on: ubuntu-latest
    environment: ${{ github.ref != 'refs/heads/main' && 'ci-pr-checks-approval' || '' }}
    steps:
      - uses: actions/checkout@v6
      - name: Install act
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/nektos/act/master/install.sh \
            | bash -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Bootstrap act env files from examples
        env:
          REAL_GITHUB_TOKEN: ${{ github.token }}
        run: |
          cp .github/act/var.env.example .github/act/var.env
          # The example uses a stub GITHUB_TOKEN so the file is committable;
          # replace it with the real CI token so act can clone the external
          # actions referenced by the workflows being linted.
          {
            grep -v '^GITHUB_TOKEN=' .github/act/secret.env.example
            printf 'GITHUB_TOKEN=%s\n' "$REAL_GITHUB_TOKEN"
          } > .github/act/secret.env
      - name: Lint all workflows
        run: make test-all-workflows ACT="act -n -P ubuntu-latest=catthehacker/ubuntu:act-latest"
