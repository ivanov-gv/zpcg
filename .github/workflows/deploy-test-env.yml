name: Deploy to Test Environment

# Runs ONLY on explicit manual trigger — never automatically.
# Use this to validate a PR in a real environment before merging.
#
# How to trigger:
#   gh workflow run deploy-test-env.yml --ref <pr-branch>
#   or via Actions → "Deploy to Test Environment" → Run workflow → select branch
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy (for tracking)'
        required: false
        type: string

# TODO: set up these secrets in the repository settings when the test environment is provisioned:
