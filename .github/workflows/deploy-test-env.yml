name: Deploy to Test Environment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy (for tracking)'
        required: false
        type: string

jobs:
  deploy-test:
    name: Deploy PR to Test Environment
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Log deploy intent
        run: |
          echo "Deploying branch '${{ github.ref_name }}' to test environment"
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "Associated PR: #${{ inputs.pr_number }}"
          fi

      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCLOUD_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCLOUD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCLOUD_REGION }}-docker.pkg.dev --quiet

      - name: Build image and push
        run: |
          IMAGE_TAG="${{ vars.DOCKER_IMAGE_PATH }}:commit-${{ github.sha }}-pr-${{ inputs.pr_number }}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          docker build -t "${IMAGE_TAG}" -f deploy/Dockerfile . \
            --label "commit=${{ github.sha }}" \
            --label "pr=${{ inputs.pr_number }}" \
            --label "ref=${{ github.ref }}"
          docker push "${IMAGE_TAG}"
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.GCLOUD_PROJECT }}" \
            --image="${IMAGE_TAG}" \
            --set-env-vars=ENVIRONMENT=${{ vars.ENV_VAR_ENVIRONMENT }} \
            --set-secrets=TELEGRAM_APITOKEN=${{ secrets.SECRET_TELEGRAM_APITOKEN }} \
            --execution-environment=gen1 \
            --region="${{ vars.GCLOUD_REGION }}" \
            --project="${{ vars.GCLOUD_PROJECT_ID }}" \
          && gcloud run services update-traffic "${{ vars.GCLOUD_PROJECT }}" \
            --to-latest \
            --region "${{ vars.GCLOUD_REGION }}"
