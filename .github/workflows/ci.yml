name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # using vendor, no module cache needed

      - name: Run unit tests
        run: |
          # internal/service/render tests require the native tdlib C library (CGO).
          # Exclude it here the same way the Makefile's test_integration comment documents.
          PKGS=$(go list ./internal/... | grep -v 'service/render')
          go test -count=1 -race $PKGS

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          # Exclude internal/service/render — its tests import go-tdlib/client which
          # requires the native tdlib C library not available on CI runners.
          args: --timeout=5m --exclude-dirs=internal/service/render ./...
