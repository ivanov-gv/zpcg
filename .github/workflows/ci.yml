name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # using vendor, no module cache needed

      - name: Run unit tests
        # render_test.go has //go:build !nolibdeps — skip it since tdlib C library is unavailable on CI.
        run: go test -count=1 -race -tags nolibdeps ./internal/...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
          # render_test.go has //go:build !nolibdeps: it imports go-tdlib/client (CGO)
          # which requires the native tdlib C library not available on CI runners.
          args: --timeout=5m --build-tags nolibdeps ./...
