name: Dry-run switch
description: Determines if dry-run mode is active based on ACT env var or input
inputs:
  dry_run:
    description: Explicit dry-run flag
    required: false
    default: 'false'
outputs:
  dry_run:
    description: Whether dry-run mode is active
    value: ${{ steps.dry_run.outputs.dry_run }}
runs:
  using: composite
  steps:
    - id: dry_run
      shell: bash
      env:
        INPUT_DRY_RUN: ${{ inputs.dry_run }}
      run: |
        # Determine if dry-run mode is active
        dry_run=$([[ "$ACT" == "true" || "$INPUT_DRY_RUN" == "true" ]] && echo true || echo false)
        echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
        echo "dry_run=$dry_run" >> "$GITHUB_STEP_SUMMARY"
