name: build
author: ivanov_gv
description: Builds docker image to be deployed further. Requires 'actions/checkout@v4' to be performed.

inputs:
  ghcr_tag:
    description: Docker image tag for ghcr.io

outputs:
  imageid:
    description: Docker image id
    value: ${{ steps.build.outputs.imageid }}
  digest:
    description: Docker image digest
    value: ${{ steps.build.outputs.digest }}

runs:
  using: "composite"
  steps:
    - name: Build
      id: build
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_RECORD_UPLOAD: false
      with:
        load: 'true'
        tags: ${{ inputs.ghcr_tag }}
        file: deploy/Dockerfile

    - name: Job Summary
      if: always()
      shell: bash
      run: |
        {
          echo "**GHCR tag**: ${{ inputs.ghcr_tag }}"
          echo "**Docker image id**: ${{ steps.build.outputs.imageid }}"
          echo "**Docker image digest**: ${{ steps.build.outputs.digest }}"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
