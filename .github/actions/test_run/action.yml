name: Test-run switch
description: Determines if test-run mode is active based on ACT env var or input
inputs:
  test_run:
    description: Explicit test-run flag
    required: false
    default: 'false'
outputs:
  test_run:
    description: Whether test-run mode is active
    # Computed as a workflow expression so the value is available even when bash
    # steps don't execute (e.g. `act -n` dry-run). `vars.ACT` is set by act via
    # --var-file; real GitHub never defines it, so production behaviour is unchanged.
    value: ${{ inputs.test_run == 'true' || vars.ACT == 'true' }}
runs:
  using: composite
  steps:
    - shell: bash
      env:
        TEST_RUN: ${{ inputs.test_run == 'true' || vars.ACT == 'true' }}
      run: echo "test_run=$TEST_RUN" >> "$GITHUB_STEP_SUMMARY"
