name: dry-run
description: >
  Marker step for dry-run jobs. Emits a job-summary warning when the calling
  workflow has selected its dry-run job variant. Workflows now decide between
  dry-run and default execution at the job level (via `if: inputs.dry_run ==
  true`), so this action no longer overrides the value based on ACT.

  Local act runs honour the user-supplied `dry_run` input. To run in dry-run
  mode locally, pass `dry_run=true` explicitly to the workflow.

inputs:
  dry_run:
    description: >
      Effective dry_run value chosen by the caller. Pass 'true' from a dry-run
      job; the warning is emitted only in that case.
    required: false
    default: 'false'

outputs:
  dry_run:
    description: Echoes back the input for callers that want a single source to read.
    value: ${{ inputs.dry_run }}

runs:
  using: composite
  steps:
    - name: Dry-run warning
      if: inputs.dry_run == 'true'
      shell: bash
      run: |
        {
          echo "> [!WARNING]"
          echo "> **Dry-run mode is active.** Write operations (registry push, Cloud Run deploy) are skipped."
          echo "> Read-only operations (image pull, local build, registry existence checks) run normally."
        } | tee -a "$GITHUB_STEP_SUMMARY"
