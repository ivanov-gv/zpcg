name: detect-run-context
description: >
  Single source of truth for detecting local act runs and computing the
  effective dry_run value. This is the only place in the repository that reads
  the act-specific ACT environment variable.

  Exports CI_IS_ACT and CI_DRY_RUN to the job environment ($GITHUB_ENV) so
  that subsequent steps and composite actions can read them without referencing
  the act-internal ACT variable directly.

inputs:
  dry_run:
    description: >
      Requested dry_run value from the workflow_dispatch input.
      Pass an empty string for non-dispatch events (e.g. tag push) to default
      to dry_run=false.
    required: false
    default: 'false'

outputs:
  dry_run:
    description: >
      Effective dry_run value. 'true' when the input is 'true' or when the
      workflow is running locally via act.
    value: ${{ steps.detect.outputs.dry_run }}

runs:
  using: composite
  steps:
    - name: Compute effective dry_run
      id: detect
      shell: bash
      run: |
        dry_run="${{ inputs.dry_run }}"
        is_act="false"

        if [[ "${ACT:-}" == "true" ]]; then
          dry_run="true"
          is_act="true"
          echo "::notice::Running in act (local) — dry-run mode enforced"
        elif [[ -z "$dry_run" ]]; then
          # Non-dispatch event (e.g. tag push) — default to not dry-run
          dry_run="false"
        fi

        echo "dry_run=${dry_run}"  >> "$GITHUB_OUTPUT"
        echo "CI_IS_ACT=${is_act}" >> "$GITHUB_ENV"
        echo "CI_DRY_RUN=${dry_run}" >> "$GITHUB_ENV"
