name: Deploy
description: >
  Deploys a container image to Cloud Run with arbitrary environment variables
  and Secret Manager mounts.

  Authentication is the caller's responsibility — run ./.github/actions/auth
  before this action. This action does not authenticate to Google Cloud.

  Test-run mode (inputs.test_run='true'): skips deployment. Prints a plan
  summary to the job summary instead.

inputs:
  gcloud_image:
    description: Full GCloud Artifact Registry image ref to deploy (use the gcloud_tag output from build-and-push).
    required: true
  gcloud_project_id:
    description: GCP project ID.
    required: true
  gcloud_region:
    description: Cloud Run and Artifact Registry region (e.g. europe-west1).
    required: true
  gcloud_run_service:
    description: Cloud Run service name.
    required: true
  env_vars:
    description: >
      Environment variables to inject into the Cloud Run service.
      Format: |-
              ENV1=ENV1_VALUE
              ENV2=ENV2_VALUE
    required: false
    default: ''
  secrets:
    description: >
      Secrets to mount from Secret Manager.
      Format: |-
              SECRET1=VALUE
              SECRET2=VALUE
    required: false
    default: ''
  test_run:
    description: >
      If 'true', skip Cloud Run deployment.
      Prints a plan summary to the job summary.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Deploy to Cloud Run
      if: inputs.test_run != 'true'
      uses: google-github-actions/deploy-cloudrun@v3
      with:
        service: ${{ inputs.gcloud_run_service }}
        image: ${{ inputs.gcloud_image }}
        region: ${{ inputs.gcloud_region }}
        project_id: ${{ inputs.gcloud_project_id }}
        env_vars: ${{ inputs.env_vars }}
        secrets: ${{ inputs.secrets }}

    - name: Test-run summary
      if: inputs.test_run == 'true'
      shell: bash
      run: |
        {
          echo "## Test-run mode — deployment skipped"
          echo ""
          echo "| Parameter | Value |"
          echo "|---|---|"
          echo "| **Service** | \`${{ inputs.gcloud_run_service }}\` |"
          echo "| **Image** | \`${{ inputs.gcloud_image }}\` |"
          echo "| **Project ID** | \`${{ inputs.gcloud_project_id }}\` |"
          echo "| **Region** | \`${{ inputs.gcloud_region }}\` |"
          echo "| **Environment Variables** | \`${{ inputs.env_vars }}\` |"
          echo "| **Secrets** | \`${{ inputs.secrets }}\` |"
        } | tee -a "$GITHUB_STEP_SUMMARY"
