name: deploy
description: >
  Authenticates to Google Cloud via Workload Identity Federation and deploys
  a container image to Cloud Run. Injects ENVIRONMENT as an env var and mounts
  the Telegram API token from Secret Manager by version reference.
  No long-lived credentials are stored — the GitHub OIDC token is exchanged
  for a short-lived GCP access token at runtime.

inputs:
  gcloud_image:
    description: Full GCloud Artifact Registry image ref to deploy (use the gcloud_tag output from build-and-push).
    required: true
  gcloud_project_id:
    description: GCP project ID.
    required: true
  gcloud_region:
    description: Cloud Run and Artifact Registry region (e.g. europe-west1).
    required: true
  gcloud_run_service:
    description: Cloud Run service name.
    required: true
  env_var_environment:
    description: Value for the ENVIRONMENT env var injected into the Cloud Run service.
    required: true
  gcloud_secret_version_telegram_token:
    description: Secret Manager version reference for the Telegram API token (e.g. projects/my-project/secrets/telegram-token/versions/latest).
    required: true
  gcloud_identity_provider:
    description: Workload Identity Provider resource name.
    required: true
  gcloud_service_account:
    description: Service account email authorized for the Workload Identity Provider.
    required: true

runs:
  using: composite
  steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ inputs.gcloud_project_id }}
        workload_identity_provider: ${{ inputs.gcloud_identity_provider }}
        service_account: ${{ inputs.gcloud_service_account }}
        create_credentials_file: true

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v3
      with:
        service: ${{ inputs.gcloud_run_service }}
        image: ${{ inputs.gcloud_image }}
        env_vars: ENVIRONMENT=${{ inputs.env_var_environment }}
        secrets: TELEGRAM_APITOKEN=${{ inputs.gcloud_secret_version_telegram_token }}
        region: ${{ inputs.gcloud_region }}
        project_id: ${{ inputs.gcloud_project_id }}
