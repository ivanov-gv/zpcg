name: deploy
description: >
  Deploys a container image to Cloud Run. Injects ENVIRONMENT as an env var
  and mounts the Telegram API token from Secret Manager by version reference.

  Authentication is the caller's responsibility — run ./.github/actions/auth
  before this action. This action does not authenticate to Google Cloud.

  Dry-run mode (inputs.dry_run='true'): skips deployment. Prints a plan
  summary to the job summary instead.

inputs:
  gcloud_image:
    description: Full GCloud Artifact Registry image ref to deploy (use the gcloud_tag output from build-and-push).
    required: true
  gcloud_project_id:
    description: GCP project ID.
    required: true
  gcloud_region:
    description: Cloud Run and Artifact Registry region (e.g. europe-west1).
    required: true
  gcloud_run_service:
    description: Cloud Run service name.
    required: true
  env_var_environment:
    description: Value for the ENVIRONMENT env var injected into the Cloud Run service.
    required: true
  gcloud_secret_version_telegram_token:
    description: Secret Manager version reference for the Telegram API token (e.g. projects/my-project/secrets/telegram-token/versions/latest).
    required: true
  dry_run:
    description: >
      If 'true', skip Cloud Run deployment.
      Prints a plan summary to the job summary.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Deploy to Cloud Run
      if: inputs.dry_run != 'true'
      uses: google-github-actions/deploy-cloudrun@v3
      with:
        service: ${{ inputs.gcloud_run_service }}
        image: ${{ inputs.gcloud_image }}
        env_vars: ENVIRONMENT=${{ inputs.env_var_environment }}
        secrets: TELEGRAM_APITOKEN=${{ inputs.gcloud_secret_version_telegram_token }}
        region: ${{ inputs.gcloud_region }}
        project_id: ${{ inputs.gcloud_project_id }}

    - name: Dry-run summary
      if: inputs.dry_run == 'true'
      shell: bash
      run: |
        {
          echo "## Dry-run mode — deployment skipped"
          echo ""
          echo "| key | value |"
          echo "|---|---|"
          echo "| gcloud_image | \`${{ inputs.gcloud_image }}\` |"
          echo "| gcloud_run_service | \`${{ inputs.gcloud_run_service }}\` |"
          echo "| gcloud_project_id | \`${{ inputs.gcloud_project_id }}\` |"
          echo "| gcloud_region | \`${{ inputs.gcloud_region }}\` |"
          echo "| env_var_environment | \`${{ inputs.env_var_environment }}\` |"
        } | tee -a "$GITHUB_STEP_SUMMARY"
