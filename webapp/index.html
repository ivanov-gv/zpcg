<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>Monterails · Montenegro Trains</title>

  <!-- Telegram Mini App SDK (safe to load outside Telegram — becomes a no-op) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Leaflet for the stations map -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="app-header">
      <button class="icon-btn" id="back-btn" aria-label="Back" hidden>‹</button>
      <div class="app-title">
        <span class="logo">🚆</span>
        <span id="page-title">Monterails</span>
      </div>
      <button class="icon-btn" id="lang-btn" aria-label="Language">EN</button>
    </header>

    <main id="view-root" class="view-root">
      <!-- Views are rendered here by js/router.js -->
    </main>

    <nav class="tabbar">
      <button class="tab" data-route="#/">
        <span class="tab-icon">🔍</span><span class="tab-label" data-i18n="tab.search">Search</span>
      </button>
      <button class="tab" data-route="#/map">
        <span class="tab-icon">🗺️</span><span class="tab-label" data-i18n="tab.map">Map</span>
      </button>
      <button class="tab" data-route="#/alerts">
        <span class="tab-icon">🔔</span><span class="tab-label" data-i18n="tab.alerts">Alerts</span>
      </button>
      <button class="tab" data-route="#/saved">
        <span class="tab-icon">⭐</span><span class="tab-label" data-i18n="tab.saved">Saved</span>
      </button>
      <button class="tab" data-route="#/info">
        <span class="tab-icon">ℹ️</span><span class="tab-label" data-i18n="tab.info">Info</span>
      </button>
    </nav>
  </div>

  <!-- Template: station picker sheet -->
  <template id="tpl-picker">
    <div class="sheet-backdrop"></div>
    <div class="sheet" role="dialog" aria-modal="true">
      <header class="sheet-header">
        <input type="search" class="sheet-input" data-i18n-ph="picker.search"
               placeholder="Search station…" autocomplete="off" />
        <button class="icon-btn sheet-close">✕</button>
      </header>
      <ul class="station-list"></ul>
    </div>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
