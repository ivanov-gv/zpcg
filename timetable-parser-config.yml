          Trains on this route run only in the summer season.
          From 13.06.2026 to 14.09.2026 the Subotica - Belgrade - Bar train will be added to the timetable
        hr: |
          Na ovoj ruti vlakovi voze samo u ljetnoj sezoni.
          Od 13.06.2026 do 14.09.2026 u vozni red bit će dodan vlak Subotica - Beograd - Bar
        ru: |
          По этому маршруту поезда есть только в летний сезон. 
          С 13.06.2026 по 14.09.2026 в расписании добавится поезд Суботица - Белград - Бар
