          На гэтым маршруце цягнікі ходзяць толькі ў летні сезон.
          З 13.06.2026 па 14.09.2026 у расклад дадасца цягнік Суботыца - Белград - Бар
        de: |
          Auf dieser Strecke fahren Züge nur in der Sommersaison.
          Vom 13.06.2026 bis 14.09.2026 wird der Zug Subotica - Belgrad - Bar in den Fahrplan aufgenommen
