          Der restliche Fahrplan bleibt unverändert
        en: |
          The timetable has already been updated
          From 13.06.2026 to 14.09.2026 the Subotica - Bar train will be added

          The rest of the timetable will not change
        hr: |
          Vozni red je već ažuriran
          Od 13.06.2026 do 14.09.2026 dodaje se vlak Subotica - Bar

          Ostatak voznog reda neće se promijeniti
        ru: |
          Расписание уже обновлено
          13.06.2026 по 14.09.2026 добавится поезд Суботица - Бар

